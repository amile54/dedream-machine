name: Build & Release

on:
  workflow_dispatch:  # 手动触发：在 GitHub Actions 页面点 "Run workflow" 即可

jobs:
  build:
    strategy:
      fail-fast: false  # 一个平台失败不影响另一个
      matrix:
        include:
          - platform: macos-14        # Apple Silicon (M1) runner
            target: aarch64-apple-darwin
            label: macOS-ARM
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ---- macOS: 下载 ARM 版 FFmpeg & FFprobe ----
      - name: Download FFmpeg (macOS ARM)
        if: matrix.platform == 'macos-14'
        run: |
          mkdir -p src-tauri/bin

          # Download ffmpeg static binary
          curl -L -o /tmp/ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_out
          cp /tmp/ffmpeg_out/ffmpeg src-tauri/bin/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/bin/ffmpeg-aarch64-apple-darwin

          # Download ffprobe static binary
          curl -L -o /tmp/ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_out
          cp /tmp/ffprobe_out/ffprobe src-tauri/bin/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/bin/ffprobe-aarch64-apple-darwin

          # Verify
          ls -lh src-tauri/bin/
          file src-tauri/bin/ffmpeg-aarch64-apple-darwin

      # ---- Windows: 下载 x64 版 FFmpeg & FFprobe ----
      - name: Download FFmpeg (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/bin
          $zipUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zipFile = "ffmpeg-win.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile
          Expand-Archive -Path $zipFile -DestinationPath ffmpeg-tmp -Force
          $binDir = Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $binDir.FullName -Destination "src-tauri/bin/ffmpeg-x86_64-pc-windows-msvc.exe"
          $probeFile = Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $probeFile.FullName -Destination "src-tauri/bin/ffprobe-x86_64-pc-windows-msvc.exe"
          Remove-Item $zipFile, ffmpeg-tmp -Recurse -Force
          Get-ChildItem src-tauri/bin/

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeDream-Machine-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
