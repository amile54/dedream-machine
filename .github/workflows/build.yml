name: Build & Release

on:
  workflow_dispatch:  # 手动触发：在 GitHub Actions 页面点 "Run workflow" 即可

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ---- macOS: 下载 ARM 版 FFmpeg & FFprobe ----
      - name: Download FFmpeg (macOS ARM)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p src-tauri/bin
          npm install ffmpeg-static ffprobe-static
          cp node_modules/ffmpeg-static/ffmpeg src-tauri/bin/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/bin/ffmpeg-aarch64-apple-darwin
          # ffprobe-static 的路径结构
          FFPROBE_PATH=$(node -e "console.log(require('ffprobe-static').path)")
          cp "$FFPROBE_PATH" src-tauri/bin/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/bin/ffprobe-aarch64-apple-darwin

      # ---- Windows: 下载 x64 版 FFmpeg & FFprobe ----
      - name: Download FFmpeg (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/bin
          $zipUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zipFile = "ffmpeg-win.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile
          Expand-Archive -Path $zipFile -DestinationPath ffmpeg-tmp -Force
          $binDir = Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $binDir.FullName -Destination "src-tauri/bin/ffmpeg-x86_64-pc-windows-msvc.exe"
          $probeFile = Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $probeFile.FullName -Destination "src-tauri/bin/ffprobe-x86_64-pc-windows-msvc.exe"
          Remove-Item $zipFile, ffmpeg-tmp -Recurse -Force

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeDream-Machine-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
